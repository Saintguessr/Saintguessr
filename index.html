<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saintguessr</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Złote tło nawiązujące do aureoli */
            background: linear-gradient(135deg, #ffa751 0%, #ffe259 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* Styl dla ikony nad napisem głównym */
        .game-logo-top {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            margin-bottom: 15px;
            border: 3px solid #ffffff;
        }

        h1 {
            /* Czerwony kolor pinezki z grubą białą obwolutą */
            color: #ff416c;
            text-shadow: 
                -2px -2px 0 #fff,  
                 2px -2px 0 #fff,
                -2px  2px 0 #fff,
                 2px  2px 0 #fff,
                 0px  4px 10px rgba(0,0,0,0.2);
            margin: 0 0 5px 0;
            font-size: 42px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 900;
            text-align: center;
        }

        .subtitle {
            color: #2c3e50;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 25px;
            text-shadow: 0 1px 2px rgba(255,255,255,0.6);
            text-align: center;
        }

        .status-bar {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-weight: bold;
            color: #1a252f;
            font-size: 20px;
            text-shadow: 0 1px 1px rgba(255,255,255,0.5);
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 25px;
            max-width: 1000px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            box-sizing: border-box;
        }

        @media (max-width: 768px) {
            .game-container { grid-template-columns: 1fr; }
        }

        .image-section, .map-section {
            display: flex;
            flex-direction: column;
        }

        /* Czerwone nagłówki sekcji z białą obwolutą */
        .section-title {
            color: #ff4b2b;
            text-shadow: 
                -1px -1px 0 #fff,  
                 1px -1px 0 #fff,
                -1px  2px 0 #fff,
                 1px  2px 0 #fff;
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 20px;
            font-weight: bold;
        }

        .image-box {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a252f;
            border: 3px solid #ff416c;
            border-radius: 12px;
            padding: 10px;
            height: 380px;
            text-align: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .saint-image {
            max-width: 100%;
            max-height: 100%;
            border-radius: 6px;
            object-fit: contain;
        }

        #map {
            height: 380px;
            border-radius: 12px;
            border: 3px solid #ff416c;
            z-index: 1;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .timeline-section {
            grid-column: 1 / -1;
            background: #1a252f;
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .slider {
            width: 90%;
            margin: 15px 0;
            cursor: pointer;
            accent-color: #ff416c;
        }

        .btn {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
            color: white;
            border: 2px solid #ffffff;
            padding: 18px;
            font-size: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s ease;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(255, 65, 108, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(255, 65, 108, 0.6);
        }
        
        .btn:active {
            transform: translateY(1px);
        }

        .result {
            grid-column: 1 / -1;
        }

        .end-screen {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
    </style>
</head>

        let gameSaints = [];
        let currentRound = 0;
        let map, userMarker, correctCircle;
        let selectedLat = null, selectedLng = null;
        let totalScore = 0;

        function startNewGame() {
            totalScore = 0;
            currentRound = 0;
            const shuffled = [...allSaints].sort(() => 0.5 - Math.random());
            gameSaints = shuffled.slice(0, 5); 
            initRound();
        }

        function initRound() {
            const saint = gameSaints[currentRound];
            
            document.getElementById('round-counter').innerText = `Runda: ${currentRound + 1} / 5`;
            document.getElementById('score-counter').innerText = `Suma punktów: ${totalScore}`;
            
            const pic = document.getElementById('saint-pic');
            pic.src = saint.img_url;
            
            document.getElementById('result-box').innerHTML = "";
            document.getElementById('year-slider').value = 1000;
            updateYearLabel(1000);
            
            document.getElementById('action-btn').style.display = "block";
            
            if (!map) {
                map = L.map('map').setView([45, 15], 3);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; OpenStreetMap'
                }).addTo(map);
                
                map.on('click', function(e) {
                    if (document.getElementById('action-btn').style.display === "none") return;
                    selectedLat = e.latlng.lat;
                    selectedLng = e.latlng.lng;
                    
                    if (userMarker) { map.removeLayer(userMarker); }
                    userMarker = L.marker([selectedLat, selectedLng]).addTo(map);
                });
            } else {
                if (userMarker) { map.removeLayer(userMarker); userMarker = null; }
                if (correctCircle) { map.removeLayer(correctCircle); correctCircle = null; }
                selectedLat = null;
                selectedLng = null;
                map.setView([45, 15], 3);
            }
        }

        function updateYearLabel(val) {
            let yearText = val < 0 ? Math.abs(val) + " p.n.e." : val + " n.e.";
            document.getElementById('year-label').innerText = yearText;
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
        }

        function checkAnswer() {
            if (selectedLat === null) {
                alert("Proszę najpierw wskazać miejsce urodzenia na mapie kliknięciem!");
                return;
            }

            const saint = gameSaints[currentRound];
            const userYear = parseInt(document.getElementById('year-slider').value);
            
            const distanceDiff = getDistance(selectedLat, selectedLng, saint.lat, saint.lng);
            const yearDiff = Math.abs(userYear - saint.birth_year);

            // NOWY SUROWY SYSTEM PUNKTACJI
            // Zerowanie przy 5000 km (1 km = minus 1 punkt z puli 5000)
            let mapScore = 5000 - distanceDiff; 
            if (mapScore < 0) mapScore = 0;

            // Zerowanie przy 500 latach (1 rok = minus 10 punktów z puli 5000)
            let timeScore = 5000 - (yearDiff * 10); 
            if (timeScore < 0) timeScore = 0;

            let roundScore = Math.round(mapScore + timeScore);
            
            totalScore += roundScore;
            document.getElementById('score-counter').innerText = `Suma punktów: ${totalScore}`;
            document.getElementById('action-btn').style.display = "none";

            let nextButtonHTML = '';
            if (currentRound < 4) {
                nextButtonHTML = `<button class="btn" style="width:100%; margin-top:10px;" onclick="advanceRound()">Następna runda &raquo;</button>`;
            } else {
                nextButtonHTML = `<button class="btn" style="width:100%; margin-top:10px; background: linear-gradient(135deg, #e67e22 0%, #d35400 100%); box-shadow: 0 5px 15px rgba(230,126,34,0.4);" onclick="showEndScreen()">Zobacz podsumowanie gry &raquo;</button>`;
            }

            let birthYearFormatted = saint.birth_year < 0 ? Math.abs(saint.birth_year) + " p.n.e." : saint.birth_year + " n.e.";

            document.getElementById('result-box').innerHTML = `
                <div style="background: #1a252f; color: white; padding: 15px; border-radius: 12px; margin-top: 15px; border: 2px solid #ff416c;">
                    <h2 style="margin: 0 0 10px 0; color: #ffe259;">To: ${saint.name}</h2>
                    <p>Urodzony/a w roku: <strong>${birthYearFormatted}</strong></p>
                    <p>📍 Pomyłka geograficzna: <strong>${distanceDiff} km</strong> (Punkty: ${Math.round(mapScore)}/5000)</p>
                    <p>⏳ Pomyłka chronologiczna: <strong>${yearDiff} lat</strong> (Punkty: ${Math.round(timeScore)}/5000)</p>
                    <hr style="border-color: rgba(255,255,255,0.2);">
                    <p style="font-size: 20px; margin: 5px 0 0 0;">
                        Punkty w tej rundzie: <strong style="color: #2ecc71;">+${roundScore}</strong> / 10000
                    </p>
                </div>
                ${nextButtonHTML}
            `;

            correctCircle = L.circle([saint.lat, saint.lng], {
                color: '#2ecc71', fillColor: '#2ecc71', fillOpacity: 0.5, radius: 150000
            }).addTo(map).bindPopup(`<b>${saint.name}</b><br>Miejsce urodzenia`).openPopup();
            
            map.setView([saint.lat, saint.lng], 4);
        }

        function advanceRound() {
            currentRound++;
            initRound();
        }

        function showEndScreen() {
            let rating = "";
            if (totalScore >= 35000) rating = "🥇 Jesteś genialnym hagiografem i historykiem! Surowe zasady Ci niestraszne.";
            else if (totalScore >= 22000) rating = "🥈 Świetny wynik! Trudne warunki, ale masz solidną wiedzę.";
            else if (totalScore >= 10000) rating = "🥉 Dobra rozgrywka, ale limity kilometrów lub lat odcięły Ci trochę punktów.";
            else rating = "👨‍🎓 Te kryteria są bezwzględne! Warto spróbować jeszcze raz i precyzyjniej celować.";

            document.getElementById('main-box').innerHTML = `
                <div class="end-screen" style="margin: 0 auto;">
                    <h2 style="color: #ff416c; margin-top:0; font-size: 32px; text-transform: uppercase;">Koniec gry!</h2>
                    <p style="font-size: 24px; margin: 20px 0; color: #2c3e50;">Twój ostateczny wynik to:</p>
                    <div style="font-size: 54px; font-weight: bold; color: #ff4b2b; margin-bottom: 20px; text-shadow: 1px 1px 0 #fff;">
                        ${totalScore} <span style="font-size:20px; color:#7f8c8d;">/ 50000 pkt</span>
                    </div>
                    <p style="font-size: 18px; color: #34495e; font-style: italic; margin-bottom: 30px;">${rating}</p>
                    <button class="btn" style="width: 100%;" onclick="location.reload()">Zagraj od nowa</button>
                </div>
            `;
        }

        window.onload = startNewGame;
    </script>
</body>
</html>
